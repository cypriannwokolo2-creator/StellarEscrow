global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert_rules.yml"
  - "alert_rules_security.yml"

scrape_configs:
  - job_name: "stellar-escrow-indexer"
    static_configs:
      - targets: ["indexer:3000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
