groups:
- name: cert-expiry.rules
  rules:
  - alert: TLSCertificateExpiringSoon
    expr: |
      min_over_time((ssl_cert_expiry{job="nginx"} - time()) / 86400[1h:]) < 15
    for: 30m
    labels:
      severity: critical
    annotations:
      summary: "SSL cert expires in less than 15 days"
      description: "Certificate will expire soon; renew with certbot."
