# StellarEscrow — Nginx Performance Tuning
# Include in the http {} block of nginx.conf:
#   include /etc/nginx/conf.d/performance.conf;

# ── Worker processes ──────────────────────────────────────────────────────────
worker_processes      auto;
worker_rlimit_nofile  65535;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    # ── Connection keep-alive ─────────────────────────────────────────────────
    keepalive_timeout     65;
    keepalive_requests    1000;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        application/javascript
        application/json
        application/wasm
        font/woff2
        image/svg+xml
        text/css
        text/plain;

    # ── Proxy buffering (for /api/ upstream) ──────────────────────────────────
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           16 8k;
    proxy_busy_buffers_size 16k;
    proxy_connect_timeout   5s;
    proxy_read_timeout      30s;
    proxy_send_timeout      30s;

    # ── Open file cache ───────────────────────────────────────────────────────
    open_file_cache          max=10000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── TCP optimisations ─────────────────────────────────────────────────────
    tcp_nopush   on;
    tcp_nodelay  on;
    sendfile     on;

    # ── Upstream connection pool to indexer ───────────────────────────────────
    upstream indexer_pool {
        server indexer:3000;
        keepalive 32;          # persistent connections to the Rust backend
    }
}
