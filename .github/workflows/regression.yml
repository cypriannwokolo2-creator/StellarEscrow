name: Regression Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit & schema regression (no server needed) ───────────────────────────
  unit-regression:
    name: Unit Regression
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install regression dependencies
        run: npm ci
        working-directory: testing/regression

      - name: Run unit regression suites
        run: npx jest --testPathPattern="validation-schema|compliance-rules|alert-rules" --runInBand --ci --json --outputFile=reports/regression-results.json
        working-directory: testing/regression
        env:
          TEST_ENV: ci
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Generate report
        run: node scripts/generate-report.js
        working-directory: testing/regression

      - name: Detect regressions vs baseline
        run: node scripts/detect-changes.js
        working-directory: testing/regression

      - name: Analyze trends
        run: node scripts/analyze-regression.js
        working-directory: testing/regression

      - name: Upload regression reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-reports-unit-${{ github.run_number }}
          path: testing/regression/reports/
          retention-days: 30

  # ── API contract regression (requires running indexer) ────────────────────
  api-regression:
    name: API Contract Regression
    runs-on: ubuntu-latest
    needs: unit-regression

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: stellar_escrow
          POSTGRES_USER: indexer
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build indexer
        run: cargo build --release -p stellar-escrow-indexer

      - name: Run migrations
        run: sqlx migrate run
        working-directory: indexer
        env:
          DATABASE_URL: postgres://indexer:password@localhost:5432/stellar_escrow

      - name: Start indexer
        run: |
          ./target/release/stellar-escrow-indexer --config indexer/config.toml &
          echo $! > /tmp/indexer.pid
          sleep 5
        env:
          DATABASE_URL: postgres://indexer:password@localhost:5432/stellar_escrow
          RUST_LOG: warn

      - name: Install regression dependencies
        run: npm ci
        working-directory: testing/regression

      - name: Run API contract regression
        run: npx jest --testPathPattern="api-contracts" --runInBand --ci --json --outputFile=reports/api-regression-results.json
        working-directory: testing/regression
        env:
          API_BASE_URL: http://localhost:3000
          TEST_ENV: ci
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload API regression reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-reports-api-${{ github.run_number }}
          path: testing/regression/reports/
          retention-days: 30

      - name: Stop indexer
        if: always()
        run: kill $(cat /tmp/indexer.pid) || true

  # ── Post regression summary as PR comment ─────────────────────────────────
  comment-results:
    name: Comment Results
    runs-on: ubuntu-latest
    needs: [unit-regression, api-regression]
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: regression-reports-unit-*
          merge-multiple: true
          path: reports/

      - name: Post regression summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'reports/regression-summary.json';
            if (!fs.existsSync(summaryPath)) return;

            const s = JSON.parse(fs.readFileSync(summaryPath, 'utf-8'));
            const icon = s.status === 'PASSED' ? '✅' : '❌';
            const body = [
              `### ${icon} Regression Tests — ${s.status}`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Total  | ${s.total} |`,
              `| Passed | ${s.passed} |`,
              `| Failed | ${s.failed} |`,
              `| Pass Rate | ${s.pass_rate}% |`,
              `| Branch | \`${s.branch}\` |`,
              `| Commit | \`${s.commit.slice(0,8)}\` |`,
              '',
              s.failed > 0
                ? '**Failed tests:**\n' + s.failed_tests.map(t => `- \`${t.name}\``).join('\n')
                : '_All regression tests passed._',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
