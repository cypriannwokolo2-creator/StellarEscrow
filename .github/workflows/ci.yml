name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Indexer — Rust build, clippy, tests
  # ---------------------------------------------------------------------------
  indexer:
    name: Indexer (Rust)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: stellar_escrow_test
          POSTGRES_USER: indexer
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://indexer:password@localhost:5432/stellar_escrow_test
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: indexer-${{ hashFiles('indexer/Cargo.toml', 'Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt --manifest-path indexer/Cargo.toml -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path indexer/Cargo.toml --all-targets -- -D warnings

      - name: Build
        run: cargo build --manifest-path indexer/Cargo.toml

      - name: Run tests
        run: cargo test --manifest-path indexer/Cargo.toml
        env:
          RUST_LOG: error

  # ---------------------------------------------------------------------------
  # Contract — Rust build + tests (no_std / Soroban)
  # ---------------------------------------------------------------------------
  contract:
    name: Contract (Soroban)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: contract-${{ hashFiles('contract/Cargo.toml', 'Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt --manifest-path contract/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path contract/Cargo.toml --all-targets -- -D warnings

      - name: Build (native — for tests)
        run: cargo build --manifest-path contract/Cargo.toml

      - name: Run tests
        run: cargo test --manifest-path contract/Cargo.toml

      - name: Build WASM release
        run: cargo build --manifest-path contract/Cargo.toml --target wasm32-unknown-unknown --release

  # ---------------------------------------------------------------------------
  # Mobile SDK — Rust build + tests
  # ---------------------------------------------------------------------------
  mobile-sdk:
    name: Mobile SDK (Rust)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: mobile-sdk-${{ hashFiles('mobile-sdk/Cargo.toml', 'Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt --manifest-path mobile-sdk/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path mobile-sdk/Cargo.toml --all-targets -- -D warnings

      - name: Build
        run: cargo build --manifest-path mobile-sdk/Cargo.toml

      - name: Run tests
        run: cargo test --manifest-path mobile-sdk/Cargo.toml

  # ---------------------------------------------------------------------------
  # API — TypeScript type-check, build, tests
  # ---------------------------------------------------------------------------
  api:
    name: API (TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --runInBand

  # ---------------------------------------------------------------------------
  # Components — TypeScript type-check, build, unit tests
  # ---------------------------------------------------------------------------
  components:
    name: Components (React/TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: components

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: components/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --runInBand

  # ---------------------------------------------------------------------------
  # Frontend — Jest unit tests
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (JS)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --runInBand

  # ---------------------------------------------------------------------------
  # Config — validate all environments
  # ---------------------------------------------------------------------------
  config:
    name: Config Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: config

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: config/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate development config
        run: npm run validate:dev

      - name: Validate staging config
        run: npm run validate:staging

      - name: Validate production config
        # Production requires contract_id + db url via env — inject stubs for CI
        env:
          STELLAR_ESCROW__DATABASE__URL: postgres://indexer:password@localhost/stellar_escrow
          STELLAR_ESCROW__STELLAR__CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
        run: npm run validate:prod
