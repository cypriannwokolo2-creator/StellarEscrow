# Secrets Store CSI Driver integration — pulls secrets from AWS Secrets Manager
# Requires: secrets-store-csi-driver + aws-secrets-manager-provider installed in cluster
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: stellar-escrow-aws-secrets
  namespace: stellar-escrow
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "stellar-escrow/production/database"
        objectType: "secretsmanager"
        jmesPath:
          - path: "url"
            objectAlias: "DATABASE_URL"
          - path: "password"
            objectAlias: "POSTGRES_PASSWORD"
      - objectName: "stellar-escrow/production/api-keys"
        objectType: "secretsmanager"
        jmesPath:
          - path: "api_keys"
            objectAlias: "API_KEYS"
          - path: "admin_keys"
            objectAlias: "ADMIN_KEYS"
      - objectName: "stellar-escrow/production/stellar"
        objectType: "secretsmanager"
        jmesPath:
          - path: "contract_id"
            objectAlias: "CONTRACT_ID"
  secretObjects:
    - secretName: stellar-escrow-secrets
      type: Opaque
      data:
        - objectName: DATABASE_URL
          key: DATABASE_URL
        - objectName: POSTGRES_PASSWORD
          key: POSTGRES_PASSWORD
        - objectName: API_KEYS
          key: API_KEYS
        - objectName: ADMIN_KEYS
          key: ADMIN_KEYS
        - objectName: CONTRACT_ID
          key: CONTRACT_ID
