apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer
  namespace: stellar-escrow
  labels:
    app: indexer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: indexer
  template:
    metadata:
      labels:
        app: indexer
    spec:
      containers:
        - name: indexer
          image: stellar-escrow/indexer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stellar-escrow-secrets
                  key: DATABASE_URL
            - name: STELLAR_ESCROW__CACHE__REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: stellar-escrow-secrets
                  key: REDIS_PASSWORD
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: stellar-escrow-config
                  key: RUST_LOG
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: indexer
  namespace: stellar-escrow
spec:
  selector:
    app: indexer
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: indexer-hpa
  namespace: stellar-escrow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: indexer
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
